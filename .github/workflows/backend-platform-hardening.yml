name: TrustGrid Backend Platform Hardening

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-platform-hardening:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Prove Maven Wrapper
        run: |
          cd apps/api
          chmod +x ./mvnw
          ./mvnw -v

      - name: Run foundation targeted backend tests
        run: |
          cd apps/api
          ./mvnw "-Dtest=TrustGridApplicationSmokeIntegrationTest,TrustGridMigrationIntegrationTest,TrustGridErrorContractIntegrationTest,TrustGridSeedFoundationIntegrationTest,TrustGridDependencyProbeIntegrationTest,TrustGridIdentityGuardrailTest" test

      - name: Run participant targeted backend tests
        run: |
          cd apps/api
          ./mvnw "-Dtest=ParticipantIdentityFlowIntegrationTest,ParticipantProfileCapabilityVerificationIntegrationTest,ParticipantStatusRestrictionIntegrationTest,ParticipantTrustSummaryAndTimelineIntegrationTest,ParticipantAdminSearchIntegrationTest,MarketplaceOutboxAndIdempotencyIntegrationTest,TrustGrid009To020ParticipantIdentityE2EIntegrationTest" test

      - name: Run marketplace lifecycle targeted backend tests
        run: |
          cd apps/api
          ./mvnw "-Dtest=CategoryAndListingFoundationIntegrationTest,ListingPublishSearchModerationIntegrationTest,ListingDuplicateRiskOutboxIntegrationTest,TransactionCreationAndIdempotencyIntegrationTest,TransactionLifecycleTypesIntegrationTest,TransactionConcurrencyAndRiskGateIntegrationTest,TransactionCancellationNoShowCompletionIntegrationTest,TransactionTimelineInvariantOutboxIntegrationTest,TrustGrid021To060MarketplaceLifecycleE2EIntegrationTest" test

      - name: Run evidence dispute risk targeted backend tests
        run: |
          cd apps/api
          ./mvnw "-Dtest=TransactionRoleAuthorizationCarryForwardIntegrationTest,TransactionInvariantCarryForwardIntegrationTest,EvidenceMetadataAndRequirementIntegrationTest,DisputeLifecycleEvidenceBundleIntegrationTest,DisputeResolutionTrustImpactIntegrationTest,ReviewReputationEligibilityIntegrationTest,ReputationSnapshotAndTierTransitionIntegrationTest,RiskDecisionRulesIntegrationTest,TrustAwareRankingReplayIntegrationTest,FraudRiskRegressionIntegrationTest,TrustGrid061To100EvidenceDisputeRiskE2EIntegrationTest" test

      - name: Run control plane proof targeted backend tests
        run: |
          cd apps/api
          ./mvnw "-Dtest=Pr5CarryForwardHardeningIntegrationTest,ReviewGraphAbuseDetectionIntegrationTest,ReviewSuppressionTrustGraphRiskIntegrationTest,MarketplaceOpsQueueIntegrationTest,ModeratorActionAuditIntegrationTest,ManualReviewSafetyEscalationIntegrationTest,PaymentBoundaryEventIntegrationTest,AnalyticsMetricsIntegrationTest,ReplayRebuildConsistencyIntegrationTest,ScamSimulatorScaleBenchmarkIntegrationTest,FailureFallbackIntegrationTest,PolicySimulationAppealIntegrationTest,FinalCoreInvariantProofIntegrationTest,TrustGrid101To160CoreProofE2EIntegrationTest,DockerRuntimeDemoScenarioIntegrationTest" test

      - name: Run policy engine targeted backend tests
        run: |
          cd apps/api
          ./mvnw "-Dtest=Pr6CarryForwardHardeningIntegrationTest,PolicyEngineLifecycleIntegrationTest,PolicyDslLiteEvaluationIntegrationTest,PolicyExceptionWorkflowIntegrationTest,PolicyBlastRadiusRollbackIntegrationTest,DomainPolicyControlsIntegrationTest,PolicySimulationDataDrivenIntegrationTest,PolicyExplainabilityAuditIntegrationTest,TrustGrid161To180PolicyEngineE2EIntegrationTest" test

      - name: Run operational trust control plane targeted backend tests
        run: |
          cd apps/api
          ./mvnw "-Dtest=Pr7CarryForwardHardeningIntegrationTest,TrustTelemetryAndSloMonitorIntegrationTest,TrustIncidentLifecycleIntegrationTest,InternalAlertOpsDashboardIntegrationTest,IncidentReplayIntegrationTest,TrustScoreLineageExplanationIntegrationTest,RankingPolicyLineageIntegrationTest,DataConsistencyVerifierIntegrationTest,LineageRebuildRepairIntegrationTest,TrustGrid181To220OperationalControlPlaneE2EIntegrationTest" test

      - name: Run final capability governance targeted backend tests
        run: |
          cd apps/api
          ./mvnw "-Dtest=Pr8OperationalHardeningIntegrationTest,CapabilityGovernancePolicyIntegrationTest,CapabilitySimulationIntegrationTest,TemporaryCapabilityGrantIntegrationTest,BreakGlassGovernanceIntegrationTest,CapabilityAccessRegressionIntegrationTest,CapabilityReplayBlastRadiusAuditIntegrationTest,CapabilityGovernanceConsistencyRepairIntegrationTest,FinalCapstoneInvariantRegressionIntegrationTest,FullDockerDemoScenarioIntegrationTest" test

      - name: Run full backend tests
        run: |
          cd apps/api
          ./mvnw test

      - name: Compile backend
        run: |
          cd apps/api
          ./mvnw -DskipTests compile

      - name: Validate Docker Compose config
        run: docker compose -f infra/docker-compose/docker-compose.yml config
